agents:
  - id: main
    name: Main
    workspace: /home/ubuntu/.openclaw/workspace
    channel: telegram
    peer:
      kind: group
      id: "*"
    note: Default fallback agent that handles any Telegram group not matched elsewhere.

  - id: line-daughter
    name: LINE Family
    workspace: workspace LINE Family
    channel: line
    note: Always-on LINE persona with bilingual chii vibe.

  - id: moltbook
    name: Moltbook
    workspace: workspace Moltbook
    channel: telegram
    peer:
      kind: group
      id: "-1003700261569"
    note: Telegram core workspace for Moltbook operations.

  - id: installer
    name: Installer
    workspace: workspace Installer
    channel: telegram
    peer:
      kind: group
      id: "-1003756041305"
    note: 职业安装大师，用来执行工具链/网络部署任务。

  - id: github-uploader
    name: Githuber
    workspace: workspace Githuber
    channel: telegram
    peer:
      kind: group
      id: "-1003321470751"
    note: GitHub 上传专用 agent。

  - id: rednote
    name: Rednoter
    workspace: workspace Rednoter
    channel: telegram
    peer:
      kind: group
      id: "-1003736722544"
    note: Rednote 团队 agent。

  - id: study-agent
    name: Learner
    workspace: workspace Learner
    channel: telegram
    peer:
      kind: group
      id: "-1003576271520"
    note: 记忆强化的学习与头脑风暴 agent。

  - id: dailybrief
    name: DailyBrief
    workspace: workspace DailyBrief
    channel: telegram
    peer:
      kind: group
      id: "-1003556458625"
    note: 早报/晚报/日报的翻译+排版专家。
